<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOOLSHOTS VLOOKUP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
    crossorigin="anonymous"></script>
  <style>
    @font-face {
      font-family: myFont;
      src: url(asset/font/Hacker-Fat.ttf);
    }

    * {
      font-family: myFont;
      color: green;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      height: 95.8vh;
      background-color: #222222;
    }

    .file-input {
      margin-bottom: 20px;
    }

    table {
      border-collapse: collapse;
      margin-top: 20px;
      width: 100%;
      max-width: 800px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1rem 5rem;
      border: black 1px solid;
      background-color: black;
    }

    #processBtn {
      background-color: rgb(0, 255, 0);
      color: black;
    }

    #resultTableContainer {
      height: 575px;
      overflow: auto;
    }

    #resultTableContainer table thead {
      position: sticky;
      top: 0;
    }
  </style>
</head>

<body>
  <div class="container h-100">
    <h2>TOOLSHOTS VLOOKUP</h2>

    <div class="border border-success p-4">
      <div class="d-flex flex-row justify-content-between">
        <div class="file-input">
          <h6>First File (Lookup Values)</h6>
          <input type="file" id="file1Input" accept=".xlsx, .xls" />
        </div>
        <div class="file-input">
          <h6>Second File (Data Source)</h6>
          <input type="file" id="file2Input" accept=".xlsx, .xls" />
        </div>
      </div>
      <button id="processBtn" disabled>Process VLOOKUP</button>
    </div>

    <div id="resultContainer" class="mt-4 w-100">
      <h6>Results</h6>
      <div id="resultTableContainer">
        <table id="resultTable" class="w-100 m-0">
          <thead>
            <tr>
              <th>Raw Lookup Value</th>
              <th>Cleaned Lookup Value</th>
              <th>Matched Value</th>
            </tr>
          </thead>
          <tbody id="resultBody">
            <tr><td colspan="3">Please upload both files first</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
